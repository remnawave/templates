name: Download Templates by RoscomVPN

on:
  workflow_dispatch:
  schedule:
    - cron: '00 10 * * *'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directory if not exists
        run: |
          mkdir -p by-roscomvpn/subscription-templates

      - name: Download template
        run: |
          curl -L "https://raw.githubusercontent.com/hydraponique/roscomvpn-routing/refs/heads/main/MIHOMO/template_remnawave.yaml" \
          -o "by-roscomvpn/subscription-templates/roscomvpn-mihomo-ru.yaml"         

      - name: Commit and push if there are changes
        run: |
          git config --local user.email "19182029+hydraponique@users.noreply.github.com"
          git config --local user.name "hydraponique"
          git add by-roscomvpn/subscription-templates/
          git commit -m "Update RoscomVPN templates" -a || echo "No changes to commit"
          git push
