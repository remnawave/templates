      "ru.zhuck.webapp",
      "ru.zolotoy585.customer",
      "ruagro.start.tech",
      "su.azure.paymaster",
      "team.rtds.checkcontrol",
      "tech.clink.emias.emiasqrcode",
      "travel.ozon.mobile",
      "tv.lfstrm.smotreshka",
      "tv.ntvplus.app",
      "tv.ntvplus.app.tv",
