proxy-groups:
  - name: 🚫 Недоступные сайты
    icon: https://cdn.jsdelivr.net/gh/remnawave/templates@main/icons/Blocked.png
    type: select
    proxies:
      - 🎲 Любой доступный сервер
      - 🇷🇺 Без VPN # Опционально

  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
